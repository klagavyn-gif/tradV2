      PRICE_FORECAST_STRETCH_ATR_MULT: ${{ vars.PRICE_FORECAST_STRETCH_ATR_MULT || '2.4' }}
      EMA_CROSS_15M_FAST_MIN: ${{ vars.EMA_CROSS_15M_FAST_MIN || '6' }}
      EMA_CROSS_15M_FAST_MAX: ${{ vars.EMA_CROSS_15M_FAST_MAX || '24' }}
      EMA_CROSS_15M_SLOW_MIN: ${{ vars.EMA_CROSS_15M_SLOW_MIN || '18' }}
      EMA_CROSS_15M_SLOW_MAX: ${{ vars.EMA_CROSS_15M_SLOW_MAX || '80' }}
      EMA_CROSS_15M_STOP_ATR_MULT: ${{ vars.EMA_CROSS_15M_STOP_ATR_MULT || '1.6' }}
      EMA_CROSS_15M_MIN_RVOL: ${{ vars.EMA_CROSS_15M_MIN_RVOL || '1.0' }}
      EMA_CROSS_15M_MIN_EMA_GAP_PCT: ${{ vars.EMA_CROSS_15M_MIN_EMA_GAP_PCT || '0.03' }}
      EMA_CROSS_15M_MIN_ATR_PCT: ${{ vars.EMA_CROSS_15M_MIN_ATR_PCT || '0.10' }}
      EMA_CROSS_15M_MAX_ATR_PCT: ${{ vars.EMA_CROSS_15M_MAX_ATR_PCT || '6.0' }}
      EMA_CROSS_15M_MIN_ADX: ${{ vars.EMA_CROSS_15M_MIN_ADX || '18.0' }}
      EMA_CROSS_15M_REQUIRE_EMA200_ALIGNMENT: ${{ vars.EMA_CROSS_15M_REQUIRE_EMA200_ALIGNMENT || 'true' }}
      EMA_CROSS_15M_REQUIRE_PATTERN: ${{ vars.EMA_CROSS_15M_REQUIRE_PATTERN || 'false' }}
      BACKTEST_FEE_BPS: ${{ vars.BACKTEST_FEE_BPS || '10' }}
      BACKTEST_SLIPPAGE_BPS: ${{ vars.BACKTEST_SLIPPAGE_BPS || '5' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Restore Telegram alert history cache
        uses: actions/cache/restore@v4
        with:
          path: .data/telegram_alerts
          key: telegram-alert-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            telegram-alert-history-${{ github.ref_name }}-
      - name: Validate Telegram secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt --no-input --prefer-binary
      - name: Reset yfinance runtime cache
        run: |
          rm -f .yf_cache/cookies.db .yf_cache/cookies.db-shm .yf_cache/cookies.db-wal
          rm -f .yf_cache/tkr-tz.db .yf_cache/tkr-tz.db-shm .yf_cache/tkr-tz.db-wal
      - name: Auto tune Telegram thresholds
        run: |
          python auto_tune_telegram_thresholds.py
      - name: Run analysis and notify
        run: |
          python trad.py --symbols "$SYMBOLS" --period "$PERIOD" --notify-telegram --verify-output "$VERIFY_OUTPUT_PATH"
      - name: Upload Telegram alert data
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: telegram-alert-data
          path: |
            .data/telegram_alerts/**
            ${{ env.VERIFY_OUTPUT_PATH }}
          if-no-files-found: ignore
          retention-days: 14
      - name: Save Telegram alert history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .data/telegram_alerts
          key: telegram-alert-history-${{ github.ref_name }}-${{ github.run_id }}
