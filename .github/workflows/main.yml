name: Telegram Alerts

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: Symbols separated by comma
        required: true
        default: "BTC-USD,DOGE-USD,ETH-USD,ADA-USD,XRP-USD,BNB-USD,SOL-USD,TRX-USD,NEAR-USD,LINK-USD"
      period:
        description: Period (15m, 1h, 1d, 5d, 1mo, 3mo, 6mo, 1y, ytd)
        required: true
        default: "15m"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: telegram-alerts
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_PROGRESS_BAR: "off"
      PYTHONUNBUFFERED: "1"
      SYMBOLS: ${{ github.event.inputs.symbols || vars.SYMBOLS || 'BTC-USD,DOGE-USD,ETH-USD,ADA-USD,XRP-USD,BNB-USD,SOL-USD,TRX-USD,NEAR-USD,LINK-USD' }}
      PERIOD: ${{ github.event.inputs.period || vars.PERIOD || '15m' }}
      TELEGRAM_ALERT_MIN_CONFIDENCE: ${{ vars.TELEGRAM_ALERT_MIN_CONFIDENCE || '82' }}
      TELEGRAM_ALERT_EXIT_MIN_CONFIDENCE: ${{ vars.TELEGRAM_ALERT_EXIT_MIN_CONFIDENCE || '60' }}
      TELEGRAM_ALERT_TTL_SECONDS: ${{ vars.TELEGRAM_ALERT_TTL_SECONDS || '1800' }}
      TELEGRAM_ALERT_MAX_PER_RUN: ${{ vars.TELEGRAM_ALERT_MAX_PER_RUN || '5' }}
      TELEGRAM_ALERT_MAX_PER_SYMBOL: ${{ vars.TELEGRAM_ALERT_MAX_PER_SYMBOL || '1' }}
      TELEGRAM_ALERT_COOLDOWN_MINUTES: ${{ vars.TELEGRAM_ALERT_COOLDOWN_MINUTES || '30' }}
      TELEGRAM_ALERT_DYNAMIC_CONF_ENABLE: ${{ vars.TELEGRAM_ALERT_DYNAMIC_CONF_ENABLE || 'true' }}
      TELEGRAM_ALERT_DYNAMIC_CONF_VOL_REF_PCT: ${{ vars.TELEGRAM_ALERT_DYNAMIC_CONF_VOL_REF_PCT || '1.8' }}
      TELEGRAM_ALERT_DYNAMIC_CONF_VOL_MULT: ${{ vars.TELEGRAM_ALERT_DYNAMIC_CONF_VOL_MULT || '2.5' }}
      TELEGRAM_KILL_SWITCH_ENABLED: ${{ vars.TELEGRAM_KILL_SWITCH_ENABLED || 'true' }}
      TELEGRAM_KILL_SWITCH_MIN_SYMBOLS: ${{ vars.TELEGRAM_KILL_SWITCH_MIN_SYMBOLS || '4' }}
      TELEGRAM_KILL_SWITCH_EXIT_RATIO: ${{ vars.TELEGRAM_KILL_SWITCH_EXIT_RATIO || '0.50' }}
      TELEGRAM_KILL_SWITCH_TREND_MISMATCH_RATIO: ${{ vars.TELEGRAM_KILL_SWITCH_TREND_MISMATCH_RATIO || '0.60' }}
      TELEGRAM_KILL_SWITCH_HIGH_VOL_PCT: ${{ vars.TELEGRAM_KILL_SWITCH_HIGH_VOL_PCT || '4.0' }}
      TELEGRAM_KILL_SWITCH_HIGH_VOL_RATIO: ${{ vars.TELEGRAM_KILL_SWITCH_HIGH_VOL_RATIO || '0.50' }}
      YF_CACHE_TTL_SECONDS: ${{ vars.YF_CACHE_TTL_SECONDS || '180' }}
      YF_INFO_CACHE_TTL_SECONDS: ${{ vars.YF_INFO_CACHE_TTL_SECONDS || '21600' }}
      ANALYZE_MAX_WORKERS: ${{ vars.ANALYZE_MAX_WORKERS || '4' }}
      ACTIONZONE_15M_ALERT_BARS: ${{ vars.ACTIONZONE_15M_ALERT_BARS || '1' }}
      ACTIONZONE_15M_MIN_STOP_PCT: ${{ vars.ACTIONZONE_15M_MIN_STOP_PCT || '1.0' }}
      EMA_CROSS_15M_MIN_STOP_PCT: ${{ vars.EMA_CROSS_15M_MIN_STOP_PCT || '1.0' }}
      CDC_VIXFIX_15M_ALERT_BARS: ${{ vars.CDC_VIXFIX_15M_ALERT_BARS || '2' }}
      CDC_VIXFIX_15M_MIN_STOP_PCT: ${{ vars.CDC_VIXFIX_15M_MIN_STOP_PCT || '1.5' }}
      CDC_VIXFIX_15M_SL_ATR_MULT: ${{ vars.CDC_VIXFIX_15M_SL_ATR_MULT || '3.0' }}
      ACTIONZONE_15M_USE_OPTIMIZATION: ${{ vars.ACTIONZONE_15M_USE_OPTIMIZATION || 'false' }}
      EMA_CROSS_15M_ENABLE_OPTIMIZATION: ${{ vars.EMA_CROSS_15M_ENABLE_OPTIMIZATION || 'false' }}
      ACTIONZONE_15M_TP_MULT: ${{ vars.ACTIONZONE_15M_TP_MULT || '2.0' }}
      ACTIONZONE_15M_STOP_ATR_MULT: ${{ vars.ACTIONZONE_15M_STOP_ATR_MULT || '1.8' }}
      ACTIONZONE_15M_MAX_FORWARD_BARS: ${{ vars.ACTIONZONE_15M_MAX_FORWARD_BARS || '64' }}
      ACTIONZONE_15M_YF_PERIOD: ${{ vars.ACTIONZONE_15M_YF_PERIOD || '30d' }}
      ACTIONZONE_15M_FAST_MIN: ${{ vars.ACTIONZONE_15M_FAST_MIN || '6' }}
      ACTIONZONE_15M_FAST_MAX: ${{ vars.ACTIONZONE_15M_FAST_MAX || '24' }}
      ACTIONZONE_15M_FAST_STEP: ${{ vars.ACTIONZONE_15M_FAST_STEP || '2' }}
      ACTIONZONE_15M_SLOW_MIN: ${{ vars.ACTIONZONE_15M_SLOW_MIN || '18' }}
      ACTIONZONE_15M_SLOW_MAX: ${{ vars.ACTIONZONE_15M_SLOW_MAX || '80' }}
      ACTIONZONE_15M_SLOW_STEP: ${{ vars.ACTIONZONE_15M_SLOW_STEP || '2' }}
      ACTIONZONE_15M_MIN_TRADES: ${{ vars.ACTIONZONE_15M_MIN_TRADES || '8' }}
      ACTIONZONE_15M_MIN_VALID_TRADES: ${{ vars.ACTIONZONE_15M_MIN_VALID_TRADES || '4' }}
      ACTIONZONE_15M_OPT_TRAIN_RATIO: ${{ vars.ACTIONZONE_15M_OPT_TRAIN_RATIO || '0.70' }}
      ACTIONZONE_15M_MIN_RVOL: ${{ vars.ACTIONZONE_15M_MIN_RVOL || '1.15' }}
      ACTIONZONE_15M_MIN_EMA_GAP_PCT: ${{ vars.ACTIONZONE_15M_MIN_EMA_GAP_PCT || '0.05' }}
      ACTIONZONE_15M_MIN_ATR_PCT: ${{ vars.ACTIONZONE_15M_MIN_ATR_PCT || '0.15' }}
      ACTIONZONE_15M_MAX_ATR_PCT: ${{ vars.ACTIONZONE_15M_MAX_ATR_PCT || '6.00' }}
      ACTIONZONE_15M_MIN_ADX: ${{ vars.ACTIONZONE_15M_MIN_ADX || '24.0' }}
      ACTIONZONE_15M_REQUIRE_EMA200_ALIGNMENT: ${{ vars.ACTIONZONE_15M_REQUIRE_EMA200_ALIGNMENT || 'true' }}
      ACTIONZONE_15M_MAX_BARS_SINCE_SIGNAL: ${{ vars.ACTIONZONE_15M_MAX_BARS_SINCE_SIGNAL || '1' }}
      ACTIONZONE_15M_REQUIRE_STRONG_TREND: ${{ vars.ACTIONZONE_15M_REQUIRE_STRONG_TREND || 'true' }}
      ACTIONZONE_15M_MIN_ALERT_CONFIDENCE: ${{ vars.ACTIONZONE_15M_MIN_ALERT_CONFIDENCE || '82' }}
      ACTIONZONE_15M_PRECISION60_ENABLED: ${{ vars.ACTIONZONE_15M_PRECISION60_ENABLED || 'false' }}
      ACTIONZONE_15M_PRECISION60_MIN_ALERT_CONFIDENCE: ${{ vars.ACTIONZONE_15M_PRECISION60_MIN_ALERT_CONFIDENCE || '90' }}
      ACTIONZONE_15M_PRECISION60_MIN_RVOL: ${{ vars.ACTIONZONE_15M_PRECISION60_MIN_RVOL || '1.30' }}
      ACTIONZONE_15M_PRECISION60_MIN_EMA_GAP_PCT: ${{ vars.ACTIONZONE_15M_PRECISION60_MIN_EMA_GAP_PCT || '0.12' }}
      ACTIONZONE_15M_PRECISION60_MIN_ADX: ${{ vars.ACTIONZONE_15M_PRECISION60_MIN_ADX || '30.0' }}
      ACTIONZONE_15M_PRECISION60_MAX_BARS_SINCE_SIGNAL: ${{ vars.ACTIONZONE_15M_PRECISION60_MAX_BARS_SINCE_SIGNAL || '0' }}
      ACTIONZONE_15M_PRECISION60_REQUIRE_EMA200_ALIGNMENT: ${{ vars.ACTIONZONE_15M_PRECISION60_REQUIRE_EMA200_ALIGNMENT || 'true' }}
      ACTIONZONE_15M_PRECISION60_REQUIRE_STRONG_TREND: ${{ vars.ACTIONZONE_15M_PRECISION60_REQUIRE_STRONG_TREND || 'true' }}
      ACTIONZONE_15M_PRECISION60_REQUIRE_TREND_ALIGNMENT: ${{ vars.ACTIONZONE_15M_PRECISION60_REQUIRE_TREND_ALIGNMENT || 'true' }}
      ACTIONZONE_15M_TIME_STOP_BARS: ${{ vars.ACTIONZONE_15M_TIME_STOP_BARS || '28' }}
      ACTIONZONE_15M_TP1_R: ${{ vars.ACTIONZONE_15M_TP1_R || '0.9' }}
      ACTIONZONE_15M_TP1_FRACTION: ${{ vars.ACTIONZONE_15M_TP1_FRACTION || '0.55' }}
      ACTIONZONE_15M_MOVE_SL_TO_BE: ${{ vars.ACTIONZONE_15M_MOVE_SL_TO_BE || 'true' }}
      ACTIONZONE_15M_TRAILING_ATR_MULT: ${{ vars.ACTIONZONE_15M_TRAILING_ATR_MULT || '2.2' }}
      ACTIONZONE_15M_VOL_LOW_PCT: ${{ vars.ACTIONZONE_15M_VOL_LOW_PCT || '0.35' }}
      ACTIONZONE_15M_VOL_HIGH_PCT: ${{ vars.ACTIONZONE_15M_VOL_HIGH_PCT || '3.50' }}
      PRICE_FORECAST_DEFAULT_HOURS: ${{ vars.PRICE_FORECAST_DEFAULT_HOURS || '6' }}
      PRICE_FORECAST_BASE_ATR_MULT: ${{ vars.PRICE_FORECAST_BASE_ATR_MULT || '1.2' }}
      PRICE_FORECAST_STRETCH_ATR_MULT: ${{ vars.PRICE_FORECAST_STRETCH_ATR_MULT || '2.4' }}
      EMA_CROSS_15M_FAST_MIN: ${{ vars.EMA_CROSS_15M_FAST_MIN || '6' }}
      EMA_CROSS_15M_FAST_MAX: ${{ vars.EMA_CROSS_15M_FAST_MAX || '24' }}
      EMA_CROSS_15M_SLOW_MIN: ${{ vars.EMA_CROSS_15M_SLOW_MIN || '18' }}
      EMA_CROSS_15M_SLOW_MAX: ${{ vars.EMA_CROSS_15M_SLOW_MAX || '80' }}
      BACKTEST_FEE_BPS: ${{ vars.BACKTEST_FEE_BPS || '10' }}
      BACKTEST_SLIPPAGE_BPS: ${{ vars.BACKTEST_SLIPPAGE_BPS || '5' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Validate Telegram secrets
        run: |
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt --no-input --prefer-binary
      - name: Run analysis and notify
        run: |
          python trad.py --symbols "$SYMBOLS" --period "$PERIOD" --notify-telegram
