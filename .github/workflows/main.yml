name: Telegram Alerts

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: Symbols separated by comma
        required: true
        default: "BTC-USD,DOGE-USD,ETH-USD,ADA-USD,XRP-USD,BNB-USD,SOL-USD,TRX-USD,NEAR-USD,LINK-USD,PAXG-USD"
      period:
        description: Period (15m, 1h, 1d, 5d, 1mo, 3mo, 6mo, 1y, ytd)
        required: true
        default: "15m"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

concurrency:
  group: telegram-alerts
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_PROGRESS_BAR: "off"
      PYTHONUNBUFFERED: "1"
      SYMBOLS: ${{ github.event.inputs.symbols || vars.SYMBOLS || 'BTC-USD,DOGE-USD,ETH-USD,ADA-USD,XRP-USD,BNB-USD,SOL-USD,TRX-USD,NEAR-USD,LINK-USD,PAXG-USD' }}
      PERIOD: ${{ github.event.inputs.period || vars.PERIOD || '15m' }}
      TELEGRAM_ALERT_MIN_CONFIDENCE: ${{ vars.TELEGRAM_ALERT_MIN_CONFIDENCE || '69' }}
      TELEGRAM_ALERT_ENTRY_MIN_HIST_WIN_RATE: ${{ vars.TELEGRAM_ALERT_ENTRY_MIN_HIST_WIN_RATE || '57.0' }}
      TELEGRAM_ALERT_TTL_SECONDS: ${{ vars.TELEGRAM_ALERT_TTL_SECONDS || '1800' }}
      TELEGRAM_ALERT_MAX_PER_RUN: ${{ vars.TELEGRAM_ALERT_MAX_PER_RUN || '2' }}
      TELEGRAM_ALERT_MAX_PER_SYMBOL: ${{ vars.TELEGRAM_ALERT_MAX_PER_SYMBOL || '1' }}
      TELEGRAM_ALERT_COOLDOWN_MINUTES: ${{ vars.TELEGRAM_ALERT_COOLDOWN_MINUTES || '90' }}
      TELEGRAM_ALERT_HISTORY_ENABLED: ${{ vars.TELEGRAM_ALERT_HISTORY_ENABLED || 'true' }}
      TELEGRAM_ALERT_HISTORY_MAX_ROWS: ${{ vars.TELEGRAM_ALERT_HISTORY_MAX_ROWS || '5000' }}
      TELEGRAM_ALERT_HISTORY_EXPORT_CSV: ${{ vars.TELEGRAM_ALERT_HISTORY_EXPORT_CSV || 'true' }}
      TELEGRAM_ALERT_RUN_REPORT_ENABLED: ${{ vars.TELEGRAM_ALERT_RUN_REPORT_ENABLED || 'true' }}
      TELEGRAM_ALERT_RUN_REPORT_MAX_ROWS: ${{ vars.TELEGRAM_ALERT_RUN_REPORT_MAX_ROWS || '500' }}
      TELEGRAM_ALERT_RUN_REPORT_TOP_CANDIDATES: ${{ vars.TELEGRAM_ALERT_RUN_REPORT_TOP_CANDIDATES || '5' }}
      TELEGRAM_ALERT_AUTO_TUNE_ENABLE: ${{ vars.TELEGRAM_ALERT_AUTO_TUNE_ENABLE || 'true' }}
      TELEGRAM_ALERT_AUTO_TUNE_HISTORY_DAYS: ${{ vars.TELEGRAM_ALERT_AUTO_TUNE_HISTORY_DAYS || '45' }}
      TELEGRAM_ALERT_AUTO_TUNE_MIN_ALERTS_PER_SYMBOL: ${{ vars.TELEGRAM_ALERT_AUTO_TUNE_MIN_ALERTS_PER_SYMBOL || '12' }}
