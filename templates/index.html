<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์หุ้น</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="header">
                <h1><i class="bi bi-graph-up"></i> แดชบอร์ดวิเคราะห์สินทรัพย์</h1>
                <p>โฟกัสสัญญาณเทรดที่จำเป็นสำหรับตัดสินใจ</p>
            </div>
        </div>

        <div class="layout">
            <div class="sidebar" id="watchlistSection">
                <div class="search-card mt-0">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0"><i class="bi bi-star"></i> รายการหุ้นที่ติดตาม</h5>
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="analyzeWatchlist()">
                            วิเคราะห์รายการติดตาม
                        </button>
                    </div>
                    <div class="watchlist-add mb-2">
                        <input type="text"
                               class="form-control form-control-sm"
                               id="watchlistAddInput"
                               placeholder="เพิ่ม Symbol เช่น NVDA"
                               onkeydown="if(event.key==='Enter'){event.preventDefault(); addFromWatchlistInput();}">
                        <button type="button" class="btn btn-outline-primary btn-sm" onclick="addFromWatchlistInput()">
                            <i class="bi bi-plus-lg"></i> เพิ่ม
                        </button>
                    </div>
                    <div class="mb-2">
                        <input type="text"
                               class="form-control form-control-sm"
                               placeholder="ค้นหา Symbol ในรายการติดตาม"
                               oninput="setWatchlistSearch(this.value)">
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2 gap-2">
                        <small class="text-muted" id="watchlistCountText"></small>
                        <div class="d-flex align-items-center gap-2">
                            <label class="form-label mb-0 small">เรียงตาม</label>
                            <select class="form-select form-select-sm" onchange="setWatchlistSort(this.value)">
                                <option value="added" selected>ตามที่เพิ่ม</option>
                                <option value="az">A → Z</option>
                                <option value="za">Z → A</option>
                            </select>
                        </div>
                    </div>
                    <div id="watchlistItems" class="watchlist-list"></div>
                </div>
            </div>

            <div class="main-content" id="analysisSection">
                <div class="search-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0"><i class="bi bi-search"></i> ค้นหาและวิเคราะห์หุ้น</h5>
                        <span class="text-muted small">รองรับหลาย Symbol พร้อมกัน</span>
                    </div>
                    <form id="searchForm">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-8">
                                <label for="symbolInput" class="form-label">Symbol สินทรัพย์ (หุ้น/คริปโต/ดัชนี) คั่นด้วย ,</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="symbolInput" 
                                       placeholder="เช่น AAPL,MSFT,GOOGL"
                                       required>
                            </div>
                            <div class="col-md-4">
                                <label for="periodSelect" class="form-label">ช่วงเวลา</label>
                                <select class="form-select" id="periodSelect">
                                    <option value="15m">15 นาที (Intraday)</option>
                                    <option value="1h">1 ชั่วโมง (Intraday)</option>
                                    <option value="1d">1 วัน</option>
                                    <option value="5d">5 วัน</option>
                                    <option value="1mo" selected>1 เดือน</option>
                                    <option value="3mo">3 เดือน</option>
                                    <option value="6mo">6 เดือน</option>
                                    <option value="1y">1 ปี</option>
                                    <option value="ytd">ตั้งแต่ต้นปี</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex flex-wrap gap-2 mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-play-circle"></i> เริ่มวิเคราะห์
                            </button>
                            <button type="button" class="btn btn-outline-secondary" onclick="resetForm()">
                                <i class="bi bi-arrow-counterclockwise"></i> ล้างค่า
                            </button>
                            <div class="form-check form-switch ms-auto notify-toggle">
                                <input class="form-check-input" type="checkbox" role="switch" id="notifyTelegramToggle">
                                <label class="form-check-label" for="notifyTelegramToggle">ส่งแจ้งเตือน Telegram (เฉพาะสัญญาณสำคัญ)</label>
                            </div>
                        </div>
                    </form>
                </div>

                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3">กำลังวิเคราะห์ข้อมูล...</p>
                </div>

                <div id="alertContainer"></div>

                <div id="resultsContainer"></div>
            </div>

            <div class="alert-sidebar" id="alertsSection">
                <div class="alert-panel">
                    <div class="alert-panel-header">
                        <div>
                            <h5 class="mb-0"><i class="bi bi-bell"></i> สัญญาณน่าสนใจล่าสุด</h5>
                            <small class="text-muted">จาก Quantum Hunter, Sniper, Sovereign สำหรับหุ้นที่ติดตาม</small>
                        </div>
                        <span class="badge bg-warning text-dark" id="alertCountBadge" style="display:none;"></span>
                    </div>
                    <div id="watchlistAlerts" class="alert-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        let chartInstances = {};
        let watchlist = [];
        let watchlistAutoTimer = null;
        let watchlistRequestInFlight = false;
        let currentAnalyzeController = null;
        let currentWatchlistController = null;
        let watchlistSearchText = '';
        let watchlistSortMode = 'added';
        let latestResultsMap = {};
        let buyPriceStore = {};

        function formatNumber(value, maxDecimals) {
            if (typeof value !== 'number' || isNaN(value)) return 'N/A';
            return parseFloat(value.toFixed(maxDecimals)).toString();
        }

        function getSymbolKey(symbol) {
            if (!symbol) return '';
            return symbol.toString().trim().toUpperCase();
        }

        function getSymbolDomId(symbol) {
            const key = getSymbolKey(symbol);
            return key.replace(/[^A-Z0-9]/g, '_');
        }

        function loadBuyPriceStore() {
            const raw = localStorage.getItem('buyPriceStore');
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                if (parsed && typeof parsed === 'object') {
                    buyPriceStore = parsed;
                }
            } catch (e) {
                buyPriceStore = {};
            }
        }

        function saveBuyPriceStore() {
            try {
                localStorage.setItem('buyPriceStore', JSON.stringify(buyPriceStore));
            } catch (e) {
            }
        }

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            analyzeSymbols();
        });

        function loadWatchlist() {
            const stored = localStorage.getItem('watchlistSymbols');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) {
                        watchlist = parsed;
                    }
                } catch (e) {
                    watchlist = [];
                }
            }
            renderWatchlist();
            startWatchlistAutoAnalyze();
        }

        function saveWatchlist() {
            localStorage.setItem('watchlistSymbols', JSON.stringify(watchlist));
        }

        function renderWatchlist() {
            const container = document.getElementById('watchlistItems');
            if (!container) return;
            const countEl = document.getElementById('watchlistCountText');
            const total = watchlist.length;
            const setCount = (visible, max) => {
                if (!countEl) return;
                if (!max) {
                    countEl.textContent = '0 รายการ';
                    return;
                }
                if (visible === max) {
                    countEl.textContent = max + ' รายการ';
                    return;
                }
                countEl.textContent = visible + '/' + max + ' รายการ';
            };
            if (!watchlist.length) {
                container.innerHTML = '<span class="text-muted">ยังไม่มีหุ้นที่ติดตาม</span>';
                setCount(0, 0);
                return;
            }
            let items = watchlist.slice();
            if (watchlistSearchText) {
                const term = watchlistSearchText;
                items = items.filter(sym => sym.toUpperCase().includes(term));
            }
            if (!items.length) {
                container.innerHTML = '<span class="text-muted">ไม่พบหุ้นที่ตรงกับการค้นหา</span>';
                setCount(0, total);
                return;
            }
            if (watchlistSortMode === 'az') {
                items = items.slice().sort((a, b) => a.localeCompare(b));
            } else if (watchlistSortMode === 'za') {
                items = items.slice().sort((a, b) => b.localeCompare(a));
            }
            setCount(items.length, total);
            container.innerHTML = items.map(sym => `
                <div class="watchlist-item" onclick="viewWatchlistSymbol('${sym}')">
                    <span class="watchlist-symbol">${sym}</span>
                    <button type="button" class="watchlist-remove-btn" onclick="event.stopPropagation(); removeFromWatchlist('${sym}')">
                        <i class="bi bi-x-circle"></i>
                    </button>
                </div>
            `).join('');
        }

        function viewWatchlistSymbol(symbol) {
            if (!symbol) return;
            document.getElementById('symbolInput').value = symbol;
            analyzeSymbols();
        }

        function addToWatchlist(symbol) {
            if (!symbol) return;
            const s = symbol.trim().toUpperCase();
            if (!s || watchlist.includes(s)) return;
            if (watchlist.length >= 30) {
                showAlert('ไม่สามารถเพิ่มเกิน 30 ตัวในรายการติดตาม', 'warning');
                return;
            }
            watchlist.push(s);
            saveWatchlist();
            renderWatchlist();
            showAlert('เพิ่ม ' + s + ' ในรายการติดตามแล้ว', 'success');
        }

        function addFromWatchlistInput() {
            const input = document.getElementById('watchlistAddInput');
            if (!input) return;
            const raw = (input.value || '').trim();
            if (!raw) return;
            addToWatchlist(raw);
            input.value = '';
        }

        function setWatchlistSearch(text) {
            watchlistSearchText = (text || '').trim().toUpperCase();
            renderWatchlist();
        }

        function setWatchlistSort(mode) {
            watchlistSortMode = mode || 'added';
            renderWatchlist();
        }

        function removeFromWatchlist(symbol) {
            const s = symbol.trim().toUpperCase();
            watchlist = watchlist.filter(x => x !== s);
            saveWatchlist();
            renderWatchlist();
        }

        async function analyzeWatchlist() {
            if (!watchlist.length) {
                showAlert('ยังไม่มี Symbol ในรายการติดตาม', 'info');
                return;
            }
            await autoAnalyzeWatchlistForAlerts(true);
        }

        function startWatchlistAutoAnalyze() {
            if (watchlistAutoTimer !== null) return;
            watchlistAutoTimer = setInterval(autoAnalyzeWatchlistForAlerts, 5 * 60 * 1000);
        }

        async function autoAnalyzeWatchlistForAlerts(showMessage) {
            if (!watchlist.length) return;
            if (watchlistRequestInFlight) return;
            const period = document.getElementById('periodSelect').value;
            const symbols = watchlist.join(',');
            if (!symbols) return;
            try {
                watchlistRequestInFlight = true;
                if (currentWatchlistController) {
                    currentWatchlistController.abort();
                }
                currentWatchlistController = new AbortController();
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ symbols: symbols, period: period }),
                    signal: currentWatchlistController.signal
                });
                const data = await response.json();
                if (data && Array.isArray(data.results)) {
                    data.results.forEach(r => {
                        if (!r || r.error || !r.symbol) return;
                        const key = getSymbolKey(r.symbol);
                        if (key) {
                            latestResultsMap[key] = r;
                        }
                    });
                    checkWatchlistAlerts(data.results);
                    if (showMessage) {
                        showAlert('อัปเดตข้อมูลแจ้งเตือนจากรายการติดตามเรียบร้อยแล้ว', 'success');
                    }
                } else if (showMessage && data && data.error) {
                    showAlert('ไม่สามารถอัปเดตข้อมูลแจ้งเตือนได้: ' + data.error, 'danger');
                }
            } catch (e) {
                if (showMessage) {
                    showAlert('เกิดข้อผิดพลาดในการอัปเดตแจ้งเตือน: ' + (e && e.message ? e.message : e), 'danger');
                }
            } finally {
                watchlistRequestInFlight = false;
            }
        }

        async function analyzeSymbols() {
            const symbols = document.getElementById('symbolInput').value.trim();
            const period = document.getElementById('periodSelect').value;
            const notifyToggle = document.getElementById('notifyTelegramToggle');
            const notifyTelegram = !!(notifyToggle && notifyToggle.checked);

            if (!symbols) {
                showAlert('กรุณากรอก Symbol อย่างน้อยหนึ่งตัว', 'warning');
                return;
            }

            showLoading(true);
            clearResults();

            try {
                if (currentAnalyzeController) {
                    currentAnalyzeController.abort();
                }
                currentAnalyzeController = new AbortController();
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ symbols: symbols, period: period, notify_telegram: notifyTelegram }),
                    signal: currentAnalyzeController.signal
                });

                const data = await response.json();

                if (data.error) {
                    showAlert(data.error, 'danger');
                    return;
                }

                displayResults(data.results);

            } catch (error) {
                console.error('Error:', error);
                showAlert('เกิดข้อผิดพลาดในการเชื่อมต่อ: ' + error.message, 'danger');
            } finally {
                showLoading(false);
            }
        }

        function displayResults(results) {
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = ''; // Clear previous results

            if (results.length === 0) {
                showAlert('ไม่พบข้อมูลสำหรับ Symbol ที่ระบุ', 'info');
                return;
            }

            latestResultsMap = {};

            results.forEach(result => {
                const card = document.createElement('div');
                card.className = 'result-card';

                if (result.error) {
                    card.innerHTML = `
                        <div class="alert alert-danger" role="alert">
                            <strong>${result.symbol}:</strong> ${result.error}
                        </div>
                    `;
                    resultsContainer.appendChild(card);
                    return;
                }

                const symbolKey = getSymbolKey(result.symbol);
                const symbolDomId = getSymbolDomId(result.symbol);
                if (symbolKey) {
                    latestResultsMap[symbolKey] = result;
                }
                const storedBuyPrice = symbolKey && buyPriceStore[symbolKey] ? buyPriceStore[symbolKey] : '';

                const resonanceScore = (typeof result.resonance_score === 'number') ? formatNumber(result.resonance_score, 3) : 'N/A';
                const price = (typeof result.price === 'number') ? formatNumber(result.price, 5) : 'N/A';
                const change = (typeof result.change === 'number') ? formatNumber(result.change, 3) : 'N/A';
                const prediction = result.prediction || null;
                let predictionHtml = '';
                if (prediction) {
                    const dir = prediction.direction || 'NEUTRAL';
                    const prob = (typeof prediction.probability === 'number') ? formatNumber(prediction.probability, 1) + '%' : 'N/A';
                    const move = (typeof prediction.expected_move_pct === 'number') ? formatNumber(prediction.expected_move_pct, 1) + '%' : 'N/A';
                    let holdingText = 'N/A';
                    if (typeof prediction.expected_holding_hours === 'number') {
                        holdingText = formatNumber(prediction.expected_holding_hours, 1) + ' ชม.';
                    }
                    const shortSignal = prediction.short_term_signal || '';
                    let dirText = 'กลาง/Sideway';
                    let dirBadgeClass = 'bg-secondary';
                    if (dir === 'UP') {
                        dirText = 'ขาขึ้น';
                        dirBadgeClass = 'bg-success';
                    } else if (dir === 'DOWN') {
                        dirText = 'ขาลง';
                        dirBadgeClass = 'bg-danger';
                    }
                    predictionHtml = `
                        <div class="mt-3">
                            <h5>สรุปการคาดการณ์จากทุกกลยุทธ์</h5>
                            <div class="mb-2">
                                <span class="badge ${dirBadgeClass}">แนวโน้มหลัก: ${dirText}</span>
                                <span class="badge bg-info text-dark ms-2">ความน่าจะเป็น: ${prob}</span>
                                ${shortSignal ? `<span class="badge bg-warning text-dark ms-2">สัญญาณ EMA: ${shortSignal}</span>` : ''}
                            </div>
                            <div class="result-grid">
                                <div class="result-item">
                                    <div class="result-label">คาดว่าราคาเคลื่อนที่ได้ประมาณ</div>
                                    <div class="result-value">${move}</div>
                                </div>
                                <div class="result-item">
                                    <div class="result-label">กรอบเวลาถือคร่าว ๆ</div>
                                    <div class="result-value">${holdingText}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
                const actionZone = result.actionzone_15m || null;
                const cdcVixFix = result.cdc_vixfix_15m || null;
                const emaCross = result.ema_cross_15m || null;
                const shortTerm = result.short_term_15m || null;
                const sovereign = result.sovereign_4h || null;
                let tradeSource = 'ทั่วไป';
                let tradeSignal = result.signal || 'Hold';
                let tradeConfidence = null;
                let tradeStop = null;
                let tradeTarget = null;
                let tradePlan = null;
                if (cdcVixFix && cdcVixFix.signal && cdcVixFix.signal !== 'WAIT') {
                    tradeSource = 'CDC+VixFix 15m';
                    tradeSignal = cdcVixFix.signal;
                    tradePlan = cdcVixFix;
                    if (typeof cdcVixFix.confidence === 'number') {
                        tradeConfidence = cdcVixFix.confidence;
                    }
                    if (typeof cdcVixFix.stop_loss === 'number') {
                        tradeStop = cdcVixFix.stop_loss;
                    }
                    if (typeof cdcVixFix.take_profit === 'number') {
                        tradeTarget = cdcVixFix.take_profit;
                    } else if (typeof cdcVixFix.exit_price === 'number') {
                        tradeTarget = cdcVixFix.exit_price;
                    }
                }
                if (tradeSource === 'ทั่วไป' && actionZone && actionZone.signal && actionZone.signal !== 'WAIT') {
                    tradeSource = 'ActionZone 15m';
                    tradeSignal = actionZone.signal;
                    tradePlan = actionZone;
                    if (typeof actionZone.win_prob === 'number') {
                        tradeConfidence = actionZone.win_prob;
                    } else if (typeof actionZone.confidence === 'number') {
                        tradeConfidence = actionZone.confidence;
                    }
                    if (typeof actionZone.stop_loss === 'number') {
                        tradeStop = actionZone.stop_loss;
                    }
                }
                if (tradeSource === 'ทั่วไป' && emaCross && emaCross.signal && emaCross.signal !== 'WAIT') {
                    tradeSource = 'EMA Cross 15m';
                    tradeSignal = emaCross.signal;
                    tradePlan = emaCross;
                    if (typeof emaCross.predicted_win_prob === 'number') {
                        tradeConfidence = emaCross.predicted_win_prob;
                    } else if (typeof emaCross.confidence === 'number') {
                        tradeConfidence = emaCross.confidence;
                    }
                    if (typeof emaCross.stop_loss === 'number') {
                        tradeStop = emaCross.stop_loss;
                    }
                    if (typeof emaCross.take_profit === 'number') {
                        tradeTarget = emaCross.take_profit;
                    }
                }
                if (tradeSource === 'ทั่วไป' && shortTerm && shortTerm.setup && shortTerm.setup.indexOf('WAIT') === -1) {
                    tradeSource = 'Short Term 15m';
                    tradeSignal = shortTerm.setup;
                    tradePlan = shortTerm;
                    if (typeof shortTerm.predicted_win_prob === 'number') {
                        tradeConfidence = shortTerm.predicted_win_prob;
                    } else if (typeof shortTerm.confidence === 'number') {
                        tradeConfidence = shortTerm.confidence;
                    }
                    if (typeof shortTerm.stop_loss === 'number') {
                        tradeStop = shortTerm.stop_loss;
                    }
                    if (typeof shortTerm.take_profit === 'number') {
                        tradeTarget = shortTerm.take_profit;
                    }
                }
                if (tradeSource === 'ทั่วไป' && sovereign && sovereign.recommendation) {
                    tradeSource = 'Sovereign 4H';
                    tradeSignal = sovereign.recommendation;
                    tradePlan = sovereign;
                    if (typeof sovereign.entry_stop_loss === 'number') {
                        tradeStop = sovereign.entry_stop_loss;
                    }
                    if (typeof sovereign.trailing_stop === 'number') {
                        tradeTarget = sovereign.trailing_stop;
                    }
                }
                if (tradeTarget === null && shortTerm && typeof shortTerm.take_profit === 'number') {
                    tradeTarget = shortTerm.take_profit;
                }
                if (tradeStop === null && shortTerm && typeof shortTerm.stop_loss === 'number') {
                    tradeStop = shortTerm.stop_loss;
                }
                let essentialExitLevels = [];
                if (tradePlan && Array.isArray(tradePlan.exit_levels) && tradePlan.exit_levels.length) {
                    essentialExitLevels = tradePlan.exit_levels;
                }
                const entryRiskText = (tradePlan && typeof tradePlan.entry_risk_pct === 'number')
                    ? formatNumber(tradePlan.entry_risk_pct, 2) + '%'
                    : 'N/A';
                const entryRiskLine = (tradePlan && typeof tradePlan.entry_risk_pct === 'number')
                    ? `<div class="small mb-1">ความเสี่ยงตั้งต้นต่อไม้ (จุดเข้า): ${entryRiskText}</div>`
                    : `<div class="small mb-1 text-muted">ความเสี่ยงตั้งต้นต่อไม้คำนวณเมื่อมีสัญญาณเข้าจริง</div>`;
                const essentialExitHtml = essentialExitLevels.length
                    ? `<div class="mt-2">
                        <div class="small fw-semibold mb-1">จุดออกทำกำไรแนะนำ</div>
                        ${entryRiskLine}
                        ${essentialExitLevels.slice(0, 3).map(lv => {
                            const label = lv && lv.label ? lv.label : 'TP';
                            const target = (lv && typeof lv.target_price === 'number') ? formatNumber(lv.target_price, 5) : 'N/A';
                            const profitPct = (lv && typeof lv.profit_pct === 'number') ? formatNumber(lv.profit_pct, 2) + '%' : 'N/A';
                            const spacingPct = (lv && typeof lv.spacing_pct === 'number') ? formatNumber(lv.spacing_pct, 2) + '%' : 'N/A';
                            const riskRemain = (lv && typeof lv.risk_remaining_pct === 'number') ? formatNumber(lv.risk_remaining_pct, 2) + '%' : 'N/A';
                            const closeRatio = (lv && typeof lv.close_ratio_pct === 'number') ? formatNumber(lv.close_ratio_pct, 0) + '%' : 'N/A';

        function calculateDecision(symbol) {
            const key = getSymbolKey(symbol);
            if (!key) return;
            const domId = getSymbolDomId(symbol);
            const input = document.getElementById('buyPrice-' + domId);
            const decisionEl = document.getElementById('decision-' + domId);
            if (!input || !decisionEl) return;
            const raw = input.value.trim();
            const buyPrice = parseFloat(raw);
            if (!raw || isNaN(buyPrice) || buyPrice <= 0) {
                decisionEl.innerHTML = '<span class="text-danger">กรุณากรอกราคาซื้อที่ถูกต้อง</span>';
                return;
            }
            const result = latestResultsMap[key];
            if (!result) {
                decisionEl.innerHTML = '<span class="text-danger">ไม่พบข้อมูลวิเคราะห์ล่าสุด โปรดกดวิเคราะห์สัญลักษณ์นี้ก่อน</span>';
                return;
            }
            buyPriceStore[key] = buyPrice;
            saveBuyPriceStore();
            const context = buildDecisionContext(result, buyPrice);
            const advice = buildDecisionAdvice(context);
            decisionEl.innerHTML = renderDecisionAdvice(advice);
        }

        function buildDecisionContext(result, buyPrice) {
            const s = result.sovereign_4h || null;
            const st = result.short_term_15m || null;
            const q = result.quantum_15m || null;
            const ema = result.ema_cross_15m || null;
            const pred = result.prediction || null;
            let currentPrice = null;
            if (typeof result.price === 'number') {
                currentPrice = result.price;
            } else if (s && typeof s.current_price === 'number') {
                currentPrice = s.current_price;
            } else if (st && typeof st.current_price === 'number') {
                currentPrice = st.current_price;
            }
            const profitPct = currentPrice && buyPrice ? ((currentPrice - buyPrice) / buyPrice) * 100 : null;
            let atrPct = null;
            if (st && typeof st.atr === 'number' && typeof st.current_price === 'number' && st.current_price > 0) {
                atrPct = (st.atr / st.current_price) * 100;
            }
            let rvol = null;
            if (st && typeof st.rvol === 'number') {
                rvol = st.rvol;
            }
            const adx = q && typeof q.adx === 'number' ? q.adx : null;
            let emaWinProb = null;
            let emaExpectedMovePct = null;
            let emaExpectedBars = null;
            if (ema) {
                if (typeof ema.predicted_win_prob === 'number') {
                    emaWinProb = ema.predicted_win_prob;
                } else if (typeof ema.confidence === 'number') {
                    emaWinProb = ema.confidence;
                }
                if (typeof ema.expected_move_pct === 'number') {
                    emaExpectedMovePct = ema.expected_move_pct;
                }
                if (typeof ema.expected_holding_bars_15m === 'number') {
                    emaExpectedBars = ema.expected_holding_bars_15m;
                }
            }
            let predDirection = '';
            let predProbability = null;
            if (pred) {
                if (typeof pred.direction === 'string') {
                    predDirection = pred.direction;
                }
                if (typeof pred.probability === 'number') {
                    predProbability = pred.probability;
                }
            }
            return {
                currentPrice: currentPrice,
                buyPrice: buyPrice,
                profitPct: profitPct,
                rsi: typeof result.rsi === 'number' ? result.rsi : null,
                resonanceScore: typeof result.resonance_score === 'number' ? result.resonance_score : null,
                signal: result.signal || '',
                trend: s && s.trend_status ? s.trend_status : (result.phase_status || ''),
                sovereignReco: s && s.recommendation ? s.recommendation : '',
                sovereignStop: s && typeof s.entry_stop_loss === 'number' ? s.entry_stop_loss : null,
                sovereignTrail: s && typeof s.trailing_stop === 'number' ? s.trailing_stop : null,
                shortStop: st && typeof st.stop_loss === 'number' ? st.stop_loss : null,
                shortTakeProfit: st && typeof st.take_profit === 'number' ? st.take_profit : null,
                atrPct: typeof atrPct === 'number' ? atrPct : null,
                rvol: rvol,
                adx: adx,
                emaWinProb: emaWinProb,
                emaExpectedMovePct: emaExpectedMovePct,
                emaExpectedBars: emaExpectedBars,
                predDirection: predDirection,
                predProbability: predProbability
            };
        }

        function classifyRisk(context) {
            const atrPct = typeof context.atrPct === 'number' ? context.atrPct : null;
            const rvol = typeof context.rvol === 'number' ? context.rvol : null;
            const adx = typeof context.adx === 'number' ? context.adx : null;
            const resonance = typeof context.resonanceScore === 'number' ? context.resonanceScore : null;
            const trend = (context.trend || '').toUpperCase();
            if (atrPct !== null || rvol !== null) {
                if ((atrPct !== null && atrPct >= 5) || (rvol !== null && rvol >= 3)) {
                    return 'HIGH';
                }
                if ((atrPct !== null && atrPct <= 2.5) && (rvol === null || rvol <= 1.5)) {
                    return 'LOW';
                }
            }
            if (adx !== null) {
                if (adx >= 45) return 'HIGH';
                if (adx <= 20 && atrPct !== null && atrPct <= 2) return 'LOW';
            }
            if (resonance !== null) {
                if (resonance >= 60 && trend.indexOf('BULL') !== -1) return 'LOW';
                if (resonance <= -60 && trend.indexOf('BEAR') !== -1) return 'HIGH';
            }
            return 'MEDIUM';
        }

        function buildDecisionAdvice(context) {
            const advice = {
                stance: '',
                summary: '',
                profitPct: context.profitPct,
                stopLoss: null,
                takeProfit: null,
                notes: [],
                risk: 'MEDIUM'
            };
            const profit = typeof context.profitPct === 'number' ? context.profitPct : null;
            const rsi = context.rsi;
            const resonance = context.resonanceScore;
            const trend = (context.trend || '').toUpperCase();
            const reco = (context.sovereignReco || '').toUpperCase();
            const signal = (context.signal || '').toUpperCase();
            const risk = classifyRisk(context);
            advice.risk = risk;
            const emaWinProb = typeof context.emaWinProb === 'number' ? context.emaWinProb : null;
            const predDir = (context.predDirection || '').toUpperCase();
            const predProb = typeof context.predProbability === 'number' ? context.predProbability : null;
            let maxLoss = risk === 'LOW' ? 5 : (risk === 'HIGH' ? 12 : 8);
            if (predProb !== null) {
                if (predDir === 'DOWN' && predProb >= 65) {
                    maxLoss -= 2;
                } else if (predDir === 'UP' && predProb >= 70) {
                    maxLoss += 1;
                }
            }
            if (emaWinProb !== null) {
                if (emaWinProb >= 75) {
                    maxLoss += 1;
                } else if (emaWinProb <= 45) {
                    maxLoss -= 1;
                }
            }
            if (maxLoss < 3) {
                maxLoss = 3;
            }
            if (maxLoss > 15) {
                maxLoss = 15;
            }
            const lossLimit = -maxLoss;
            let baseStop = context.sovereignStop || context.shortStop || null;
            let stopFromRisk = null;
            if (context.buyPrice && context.buyPrice > 0) {
                stopFromRisk = context.buyPrice * (1 - maxLoss / 100);
            }
            if (stopFromRisk !== null) {
                if (!baseStop) {
                    baseStop = stopFromRisk;
                } else {
                    if (risk === 'HIGH') {
                        baseStop = Math.min(baseStop, stopFromRisk);
                    } else {
                        baseStop = Math.max(baseStop, stopFromRisk);
                    }
                }
            }
            let baseTp = context.shortTakeProfit || null;
            if (!baseTp && context.buyPrice && context.buyPrice > 0) {
                baseTp = context.buyPrice * 1.15;
            }
            advice.stopLoss = baseStop;
            advice.takeProfit = baseTp;
            const isUptrend = trend.indexOf('BULL') !== -1 || signal === 'BUY' || reco.indexOf('BUY') !== -1;
            const isDowntrend = trend.indexOf('BEAR') !== -1 || signal === 'SELL';
            const strongResonance = typeof resonance === 'number' && resonance >= 60;
            const weakResonance = typeof resonance === 'number' && resonance <= -20;
            if (profit === null || context.currentPrice === null) {
                advice.stance = 'WATCH';
                advice.summary = 'ข้อมูลราคายังไม่ครบ แนะนำเฝ้าดูและไม่เพิ่มความเสี่ยง';
                advice.notes.push('ระบบไม่พบราคาปัจจุบันที่ชัดเจนจากการวิเคราะห์ล่าสุด');
                return advice;
            }
            if (profit < lossLimit) {
                advice.stance = 'CUT_LOSS';
                advice.summary = 'ขาดทุนเกินกรอบความเสี่ยงที่กำหนด แนะนำพิจารณาตัดขาดทุนเพื่อลดความเสี่ยง';
                advice.stopLoss = baseStop || stopFromRisk || (context.currentPrice * 0.97);
                advice.takeProfit = context.buyPrice;
                advice.notes.push('การปล่อยให้ขาดทุนลึกอาจกระทบพอร์ตในระยะยาว');
                if (isDowntrend || weakResonance) {
                    advice.notes.push('แนวโน้มตอนนี้ไม่สนับสนุน ให้เน้นรักษาทุนมากกว่าลุ้นกลับตัว');
                }
                return advice;
            }
            if (profit >= 15) {
                advice.stance = 'TAKE_PROFIT';
                advice.summary = 'กำไรมากกว่า 15% แนะนำทยอยขายทำกำไรและเลื่อนจุดตัดขาดทุนตาม';
                advice.stopLoss = context.currentPrice * 0.95;
                advice.takeProfit = context.currentPrice * 1.03;
                advice.notes.push('การล็อกกำไรบางส่วนช่วยลดผลกระทบหากตลาดกลับตัวแรง');
                if (isUptrend && strongResonance) {
                    advice.notes.push('แนวโน้มยังดี สามารถถือส่วนที่เหลือให้กำไรวิ่งต่อได้');
                }
                return advice;
            }
            if (profit >= 3 && profit < 15) {
                if (isUptrend && !weakResonance && (rsi === null || rsi < 70)) {
                    advice.stance = 'HOLD';
                    advice.summary = 'กำไรอยู่ในโซนปลอดภัย แนวโน้มยังสนับสนุน แนะนำถือและเลื่อนจุดตัดขาดทุน';
                    advice.stopLoss = context.currentPrice * 0.95;
                    advice.takeProfit = context.currentPrice * 1.08;
                    advice.notes.push('เลื่อนจุดตัดขาดทุนขึ้นตามราคาเพื่อล็อกกำไรบางส่วน');
                } else {
                    advice.stance = 'TAKE_PROFIT';
                    advice.summary = 'แนวโน้มเริ่มอ่อนแรง แม้ยังมีกำไร แนะนำทยอยขายบางส่วน';
                    advice.stopLoss = context.currentPrice * 0.96;
                    advice.takeProfit = context.currentPrice * 1.03;
                    advice.notes.push('RSI สูงหรือแนวโน้มไม่ชัดเจนอาจบ่งชี้ภาวะใกล้จบรอบ');
                }
                return advice;
            }
            if (profit > lossLimit && profit < 3) {
                if (isUptrend && !weakResonance && (rsi === null || (rsi > 35 && rsi < 70))) {
                    advice.stance = 'HOLD';
                    advice.summary = 'กำไร/ขาดทุนยังไม่มาก และแนวโน้มยังไม่เสียหาย แนะนำถือและตั้งจุดตัดขาดทุนให้ชัดเจน';
                    advice.stopLoss = baseStop || stopFromRisk || (context.buyPrice * 0.93);
                    advice.takeProfit = context.buyPrice * 1.12;
                } else if (isDowntrend && weakResonance) {
                    advice.stance = 'CUT_LOSS';
                    advice.summary = 'แนวโน้มไม่สนับสนุนและไม่มีสัญญาณเชิงบวก แนะนำจำกัดการขาดทุน';
                    advice.stopLoss = baseStop || stopFromRisk || (context.currentPrice * 0.97);
                    advice.takeProfit = context.buyPrice * 1.03;
                } else {
                    advice.stance = 'WATCH';
                    advice.summary = 'สัญญาณผสมกัน ยังไม่ชัดเจน ให้ใช้ขนาดไม้เล็กและเฝ้าดูใกล้ชิด';
                    advice.stopLoss = baseStop || stopFromRisk || (context.buyPrice * 0.94);
                    advice.takeProfit = context.buyPrice * 1.08;
                }
                return advice;
            }
            advice.stance = 'WATCH';
            advice.summary = 'สภาวะไม่เข้าเกณฑ์ชัดเจน แนะนำรอดูสัญญาณรอบใหม่';
            advice.notes.push('ใช้ข้อมูล Quantum Sovereign และสัญญาณระยะสั้นประกอบการตัดสินใจเพิ่มเติม');
            return advice;
        }

        function renderDecisionAdvice(advice) {
            if (!advice) return '';
            const profitText = typeof advice.profitPct === 'number'
                ? 'กำไร/ขาดทุนปัจจุบัน: ' + formatNumber(advice.profitPct, 2) + '%'
                : 'กำไร/ขาดทุนปัจจุบัน: N/A';
            let riskText = '';
            if (advice.risk === 'HIGH') {
                riskText = 'กลุ่มความเสี่ยง: สูง';
            } else if (advice.risk === 'LOW') {
                riskText = 'กลุ่มความเสี่ยง: ต่ำ';
            } else {
                riskText = 'กลุ่มความเสี่ยง: กลาง';
            }
            let stanceLabel = '';
            if (advice.stance === 'HOLD') {
                stanceLabel = '<span class="badge bg-primary me-1">ถือ</span>';
            } else if (advice.stance === 'TAKE_PROFIT') {
                stanceLabel = '<span class="badge bg-success me-1">ทำกำไร</span>';
            } else if (advice.stance === 'CUT_LOSS') {
                stanceLabel = '<span class="badge bg-danger me-1">ตัดขาดทุน</span>';
            } else {
                stanceLabel = '<span class="badge bg-secondary me-1">เฝ้าดู</span>';
            }
            const stopLossText = advice.stopLoss
                ? 'Stop loss โดยประมาณ: ' + formatNumber(advice.stopLoss, 5)
                : 'Stop loss โดยประมาณ: N/A';
            const takeProfitText = advice.takeProfit
                ? 'เป้าทำกำไรถัดไป: ' + formatNumber(advice.takeProfit, 5)
                : 'เป้าทำกำไรถัดไป: N/A';
            const notesHtml = advice.notes && advice.notes.length
                ? '<ul class="mb-0">' + advice.notes.map(n => '<li>' + n + '</li>').join('') + '</ul>'
                : '';
            return `
                <div class="border rounded p-2 bg-light">
                    <div>${stanceLabel}${advice.summary}</div>
                    <div class="small mt-1">${profitText}</div>
                    <div class="small">${riskText}</div>
                    <div class="small">${stopLossText}</div>
                    <div class="small">${takeProfitText}</div>
                    ${notesHtml}
                </div>
            `;
        }

        function renderChart(canvasId, chartData) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const existing = chartInstances[canvasId];
            if (existing) {
                existing.destroy();
            }

            chartInstances[canvasId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.dates,
                    datasets: [
                        {
                            label: 'Close Price',
                            data: chartData.close,
                            borderColor: 'rgba(75, 192, 192, 1)',
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            fill: true,
                            tension: 0.1
                        },
                        {
                            label: 'SMA20',
                            data: chartData.sma20,
                            borderColor: 'rgba(153, 102, 255, 1)',
                            backgroundColor: 'rgba(153, 102, 255, 0.2)',
                            fill: false,
                            tension: 0.1
                        },
                        {
                            label: 'BB Upper',
                            data: chartData.bb_upper,
                            borderColor: 'rgba(255, 159, 64, 1)',
                            backgroundColor: 'rgba(255, 159, 64, 0.2)',
                            fill: false,
                            tension: 0.1
                        },
                        {
                            label: 'BB Lower',
                            data: chartData.bb_lower,
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            fill: false,
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'category',
                            title: {
                                display: true,
                                text: 'Date'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Price'
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    }
                }
            });
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                                            ${message}
                                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                        </div>`;
        }

        function clearResults() {
            document.getElementById('resultsContainer').innerHTML = '';
            document.getElementById('alertContainer').innerHTML = '';
            const charts = Object.values(chartInstances);
            charts.forEach(c => {
                if (c && typeof c.destroy === 'function') {
                    c.destroy();
                }
            });
            chartInstances = {};
        }

        function resetForm() {
            const symbolInput = document.getElementById('symbolInput');
            const periodSelect = document.getElementById('periodSelect');
            if (symbolInput) symbolInput.value = '';
            if (periodSelect) periodSelect.value = '1mo';
            clearResults();
        }

        function getSignalClass(signal) {
            if (signal === 'Buy') return 'bg-success';
            if (signal === 'Sell') return 'bg-danger';
            return 'bg-secondary';
        }

        function checkWatchlistAlerts(results) {
            const alertsContainer = document.getElementById('watchlistAlerts');
            const countBadge = document.getElementById('alertCountBadge');
            if (!alertsContainer) return;
            const important = [];
            results.forEach(result => {
                if (!result || !result.symbol) return;
                const symbol = (result.symbol || '').toString().toUpperCase();
                if (!watchlist.includes(symbol)) return;
                const tags = [];
                const q = result.quantum_15m;
                if (q && q.setup && q.setup !== 'WAIT') {
                    const conf = typeof q.confidence === 'number' ? q.confidence : 0;
                    if (conf >= 80) {
                        tags.push({
                            label: 'Quantum Hunter 15m',
                            detail: q.setup + ' (' + conf + '%)'
                        });
                    }
                }
                const sn = result.sniper_15m;
                if (sn && sn.setup && sn.setup.indexOf('WAIT') === -1) {
                    const confSn = typeof sn.confidence === 'number' ? sn.confidence : 0;
                    if (confSn >= 80) {
                        tags.push({
                            label: 'Sniper 15m',
                            detail: sn.setup + ' (' + confSn + '%)'
                        });
                    }
                }
                const az = result.actionzone_15m;
                if (az && az.alert && az.signal && az.signal !== 'WAIT') {
                    const confAz = typeof az.confidence === 'number' ? az.confidence : 0;
                    const trendText = az.trend_1h ? (' 1H ' + az.trend_1h) : '';
                    tags.push({
                        label: 'ActionZone 15m',
                        detail: az.signal + trendText + (confAz ? ' (' + formatNumber(confAz, 1) + '%)' : '')
                    });
                }
                const cr = result.crypto_reversal_15m;
                if (cr && cr.setup && cr.setup.indexOf('WAIT') === -1) {
                    const confCr = typeof cr.confidence === 'number' ? cr.confidence : 0;
                    if (confCr >= 80) {
                        tags.push({
                            label: 'Crypto Reversal 15m',
                            detail: cr.setup + ' (' + confCr + '%)'
                        });
                    }
                }
                if (cr && cr.smc_setup && cr.smc_setup !== 'NONE') {
                    const smcRr = typeof cr.smc_rr === 'number' ? cr.smc_rr : 0;
                    if (smcRr >= 1.5) {
                        tags.push({
                            label: 'Crypto SMC 15m',
                            detail: cr.smc_setup + ' (R:R 1:' + smcRr.toFixed(1) + ')'
                        });
                    }
                }
                const ec = result.ema_cross_15m;
                if (ec && ec.signal && ec.signal !== 'WAIT') {
                    const rr = typeof ec.risk_reward === 'number' ? ec.risk_reward : 0;
                    const confEc = typeof ec.predicted_win_prob === 'number'
                        ? ec.predicted_win_prob
                        : (typeof ec.confidence === 'number' ? ec.confidence : 0);
                    if (rr >= 5 && confEc >= 70) {
                        tags.push({
                            label: 'EMA Cross 15m',
                            detail: ec.signal + ' (R:R 1:' + rr.toFixed(1) + ', ' + confEc + '%)'
                        });
                    }
                }
                const s = result.sovereign_4h;
                if (s) {
                    if (s.recommendation && s.recommendation.indexOf('NOW') !== -1) {
                        tags.push({
                            label: 'Sovereign 4H',
                            detail: s.recommendation
                        });
                    }
                    if (s.critical_alert) {
                        tags.push({
                            label: 'Sovereign 4H',
                            detail: s.critical_alert
                        });
                    }
                }
                if (tags.length) {
                    important.push({ symbol: symbol, tags: tags });
                }
            });
            if (!important.length) {
                alertsContainer.innerHTML = '<span class="text-muted">ยังไม่มีสัญญาณสำคัญจากหุ้นที่ติดตาม</span>';
                if (countBadge) {
                    countBadge.style.display = 'none';
                }
                return;
            }
            const scored = important.map(item => {
                let score = 0;
                item.tags.forEach(t => {
                    if (t.label === 'Sovereign 4H') score += 300;
                    if (t.label === 'Sniper 15m') score += 200;
                    if (t.label === 'Quantum Hunter 15m') score += 150;
                    if (t.detail) {
                        const m = t.detail.match(/(\d+)%/);
                        if (m && m[1]) {
                            const v = parseInt(m[1], 10);
                            if (!isNaN(v)) score += v;
                        }
                        if (/NOW|ALERT|CRITICAL/i.test(t.detail)) score += 50;
                    }
                });
                return { symbol: item.symbol, tags: item.tags, score: score };
            });
            scored.sort((a, b) => b.score - a.score);
            if (countBadge) {
                countBadge.textContent = scored.length + ' สัญญาณ';
                countBadge.style.display = 'inline-block';
            }
            alertsContainer.innerHTML = scored.map(item => `
                <div class="alert-item" onclick="viewWatchlistSymbol('${item.symbol}')">
                    <div class="alert-item-symbol">${item.symbol}</div>
                    <div class="alert-item-tags">
                        ${item.tags.map(t => `
                            <span class="badge bg-warning text-dark alert-tag">${t.label}</span>
                            <span class="badge bg-light text-dark alert-tag">${t.detail}</span>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        loadWatchlist();
        loadBuyPriceStore();
    </script>
</body>
</html>
